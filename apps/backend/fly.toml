# fly.toml — Rumbea backend
# Completa el nombre con `fly launch` (o pon el nombre a mano y corre `fly deploy`)

app = "rumbea-api"
primary_region = "gru"  # São Paulo, más cercano desde Cali

[build]
  dockerfile = "Dockerfile"

[env]
  ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
